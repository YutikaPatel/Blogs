<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yutika's Garden Notes</title>
  <style>
    :root {
      --bg: #f6f8f2;
      --card: #ffffff;
      --ink: #1f2a1f;
      --muted: #5b6c5a;
      --accent: #2f7d4e;
      --line: #d7e2d2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, #eaf3e4 0, transparent 35%),
        radial-gradient(circle at 85% 0%, #edf7ea 0, transparent 40%),
        var(--bg);
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }
    .hero {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(40, 70, 40, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { line-height: 1.7; }
    .muted { color: var(--muted); }
    .post-list {
      margin-top: 20px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
    }
    .post-list a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    .post-list a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Yutika's Garden Notes</h1>
      <p class="muted">Small stories from flowers, seasons, and calm corners of the garden.</p>
    </section>

    <section class="post-list">
      <h2>Articles</h2>
      <p>
        <a href="posts/flowers-first-post.html">Flower Crop Profit Model: Solan and Pune/Mumbai</a><br>
        <span class="muted">Published April 29, 2026</span>
      </p>
    </section>
  </main>
</body>
</html>
